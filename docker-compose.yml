services:
  flowbridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowbridge
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FLOWBRIDGE_CONFIG: /app/config.json
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
